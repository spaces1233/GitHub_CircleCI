version: 2.1

jobs:
  build:
    docker:
      - image: circleci/python:3.8
    steps:
      - checkout  # This step checks out the repository
      - run:
          name: Install dependencies
          command: pip install pytest  # Install pytest dependency
      - run:
          name: Run tests
          command: pytest --junitxml=test-results/test-report.xml  # Run the tests and save results to test-results/test-report.xml

      - store_test_results:
          path: test-results  # This will store the test results

workflows:
  version: 2
  build:
    jobs:
      - build  # This defines the job to run in the workflow
