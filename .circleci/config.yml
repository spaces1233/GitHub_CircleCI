version: 2.1

jobs:
  build:
    docker:
      - image: circleci/python:3.8
    steps:
      - checkout  # This step checks out the repository
      - run:
          name: Install dependencies
          command: pip install pytest  # Install pytest dependency
      - run:
          name: Run tests
          command: pytest  # Run the tests using pytest
      - store_test_results:
          path: test-results  # This step stores the test results from the 'test-results' directory

workflows:
  version: 2
  build:
    jobs:
      - build  # This defines the job to run in the workflow
